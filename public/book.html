<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - Coastal Key</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">Coastal Key</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/#services">Services</a></li>
        <li><a href="/book.html">Book Now</a></li>
      </ul>
    </div>
  </nav>

  <section class="booking-page">
    <div class="container">
      <h1>Book Your Appointment</h1>
      <div class="booking-layout">
        <!-- Calendar -->
        <div class="calendar-wrapper">
          <div class="calendar-header">
            <button id="prevMonth">&larr;</button>
            <h2 id="monthYear"></h2>
            <button id="nextMonth">&rarr;</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>

          <div class="time-slots" id="timeSlotsSection" style="display: none;">
            <h3>Available Times for <span id="selectedDateLabel"></span></h3>
            <div class="slots-grid" id="slotsGrid"></div>
          </div>
        </div>

        <!-- Booking Form -->
        <div class="booking-form-wrapper">
          <h2>Your Details</h2>
          <div id="formMessage" class="form-message" style="display: none;"></div>
          <form id="bookingForm">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
              <label for="service">Service</label>
              <select id="service" name="service" required>
                <option value="">Select a service</option>
                <option value="consultation">Consultation - $50 (1 hour)</option>
                <option value="followup">Follow-up - $30 (30 min)</option>
                <option value="premium">Premium Session - $100 (2 hours)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Selected Date</label>
              <div id="selectedDateDisplay" class="selected-info">No date selected</div>
            </div>
            <div class="form-group">
              <label>Selected Time</label>
              <div id="selectedTimeDisplay" class="selected-info">No time selected</div>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100;" disabled>
              Book & Pay
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Coastal Key. All rights reserved.</p>
  </footer>

  <script src="/js/calendar.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
