app = "coastal-key-platform"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  BUSINESS_NAME = "Coastal Key Treasure Coast Asset Management"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
