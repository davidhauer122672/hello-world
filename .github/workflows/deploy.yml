name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: '4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Initialize data files
        run: node scripts/init-data.js
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Test Express Server
        run: npm run test:server
      - name: Test API Gateway
        working-directory: ck-api-gateway
        run: npm test
      - name: Test Sentinel Webhook
        working-directory: sentinel-webhook
        run: npm test
      - name: Test Nemotron Worker
        working-directory: ck-nemotron-worker
        run: npm test

  deploy-website:
    name: Deploy Website
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || true
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-command-center:
    name: Deploy Command Center
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages project create ck-command-center --production-branch=main 2>&1 || true
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-gateway:
    name: Deploy API Gateway
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [test, deploy-gateway]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [test, deploy-gateway]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  smoke-test:
    name: Live Smoke Test and Status Record
    needs: [deploy-gateway, deploy-sentinel, deploy-nemotron, deploy-website, deploy-command-center]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Probe live workers
        id: probe
        run: |
          set +e
          GATEWAY_URL="https://ck-api-gateway.david-e59.workers.dev"
          NEMOTRON_URL="https://ck-nemotron-worker.david-e59.workers.dev"
          SENTINEL_URL="https://sentinel-webhook.david-e59.workers.dev"

          # Allow Cloudflare a moment to propagate after wrangler deploy
          sleep 20

          DASHBOARD=$(curl -sS --max-time 15 "$GATEWAY_URL/v1/orchestrator/dashboard" || echo '{"error":"unreachable"}')

          COLL_ID=$(echo "$DASHBOARD" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{ try{const j=JSON.parse(s);console.log(j.collectionsAgent && j.collectionsAgent.id || 'missing')}catch(e){console.log('parse_error')} })")
          COLL_STATUS=$(echo "$DASHBOARD" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{ try{const j=JSON.parse(s);console.log(j.collectionsAgent && j.collectionsAgent.status || 'missing')}catch(e){console.log('parse_error')} })")
          MASTER_STATUS=$(echo "$DASHBOARD" | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{ try{const j=JSON.parse(s);console.log(j.status||'missing')}catch(e){console.log('parse_error')} })")

          NEMOTRON_HEALTH=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$NEMOTRON_URL/v1/health" || echo "fail")
          SENTINEL_HEALTH=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$SENTINEL_URL/" || echo "fail")

          echo "coll_id=$COLL_ID" >> "$GITHUB_OUTPUT"
          echo "coll_status=$COLL_STATUS" >> "$GITHUB_OUTPUT"
          echo "master_status=$MASTER_STATUS" >> "$GITHUB_OUTPUT"
          echo "nemotron_health=$NEMOTRON_HEALTH" >> "$GITHUB_OUTPUT"
          echo "sentinel_health=$SENTINEL_HEALTH" >> "$GITHUB_OUTPUT"

      - name: Write deploy-status.json
        run: |
          cat > deploy-status.json <<EOF
          {
            "lastVerifiedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "gateway": {
              "url": "https://ck-api-gateway.david-e59.workers.dev",
              "masterPromptStatus": "${{ steps.probe.outputs.master_status }}",
              "collectionsAgent": {
                "id": "${{ steps.probe.outputs.coll_id }}",
                "status": "${{ steps.probe.outputs.coll_status }}"
              }
            },
            "nemotron": {
              "url": "https://ck-nemotron-worker.david-e59.workers.dev",
              "healthHttpStatus": "${{ steps.probe.outputs.nemotron_health }}"
            },
            "sentinel": {
              "url": "https://sentinel-webhook.david-e59.workers.dev",
              "healthHttpStatus": "${{ steps.probe.outputs.sentinel_health }}"
            }
          }
          EOF
          cat deploy-status.json

      - name: Commit deploy-status.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status.json
          if git diff --cached --quiet; then
            echo "No status change."
            exit 0
          fi
          git commit -m "Record live deploy verification for ${{ github.sha }} [skip ci]"
          # Race-safe push: rebase against any commits that landed during deploy window,
          # then push explicitly to main (avoids detached-HEAD push failure).
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "Rebase failed, retrying..."; sleep 5; continue; }
            if git push origin HEAD:main; then
              echo "deploy-status.json committed back to main on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected, retrying in 5s..."
            sleep 5
          done
          echo "::error::Failed to commit deploy-status.json after 3 attempts"
          exit 1
