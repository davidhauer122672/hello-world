name: Deploy Coastal Key Platform

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            concurrency:
              group: deploy-${{ github.ref }}
                cancel-in-progress: true

                env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
                        WRANGLER_VERSION: "4.81.0"

                        jobs:
                          test:
                              name: Test
                                  runs-on: ubuntu-latest
                                      steps:
                                            - uses: actions/checkout@v4

                                                  - uses: actions/setup-node@v4
                                                          with:
                                                                    node-version: '22'

                                                                          - name: Install all dependencies
                                                                                  run: npm install

                                                                                        - name: Test API Gateway
                                                                                                run: npm run test:gateway

                                                                                                      - name: Test Sentinel Webhook
                                                                                                              run: npm run test:sentinel
                                                                                                              
                                                                                                                    - name: Test Nemotron Worker
                                                                                                                            run: npm run test:nemotron
                                                                                                                            
                                                                                                                              deploy-website:
                                                                                                                                  name: Deploy Website
                                                                                                                                      needs: test
                                                                                                                                          if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                              runs-on: ubuntu-latest
                                                                                                                                                  steps:
                                                                                                                                                        - uses: actions/checkout@v4
                                                                                                                                                        
                                                                                                                                                              - uses: actions/setup-node@v4
                                                                                                                                                                      with:
                                                                                                                                                                                node-version: '22'
                                                                                                                                                                                
                                                                                                                                                                                      - name: Install wrangler
                                                                                                                                                                                              run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Verify credentials
                                                                                                                                                                                                            continue-on-error: false
                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                              echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
                                                                                                                                                                                                                                        echo "API Token length: ${#CLOUDFLARE_API_TOKEN}"
                                                                                                                                                                                                                                                  if [ ${#CLOUDFLARE_API_TOKEN} -lt 10 ]; then
                                                                                                                                                                                                                                                              echo "::error::CLOUDFLARE_API_TOKEN is missing or too short. Check repository secrets."
                                                                                                                                                                                                                                                                          exit 1
                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                              if [ ${#CLOUDFLARE_ACCOUNT_ID} -lt 10 ]; then
                                                                                                                                                                                                                                                                                                          echo "::error::CLOUDFLARE_ACCOUNT_ID is missing or too short. Check repository secrets."
                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                          wrangler whoami
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                - name: List directory contents
                                                                                                                                                                                                                                                                                                                                                        run: ls -la ck-website/
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                              - name: Create Pages project if needed
                                                                                                                                                                                                                                                                                                                                                                      run: wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || echo "Project may already exist - continuing"
                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                            - name: Deploy to Cloudflare Pages
                                                                                                                                                                                                                                                                                                                                                                                    run: wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                      deploy-gateway:
                                                                                                                                                                                                                                                                                                                                                                                          name: Deploy API Gateway
                                                                                                                                                                                                                                                                                                                                                                                              needs: test
                                                                                                                                                                                                                                                                                                                                                                                                  if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                      - uses: actions/setup-node@v4
                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                        node-version: '22'
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: npm install
                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Install wrangler
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Deploy to Cloudflare
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  working-directory: ck-api-gateway
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: wrangler deploy
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            deploy-sentinel:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: Deploy Sentinel Webhook
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    needs: test
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - uses: actions/setup-node@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              node-version: '22'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: npm install
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Install wrangler
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Deploy to Cloudflare
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        working-directory: sentinel-webhook
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: wrangler deploy
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  deploy-nemotron:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      name: Deploy Nemotron Worker
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          needs: test
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - uses: actions/setup-node@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    node-version: '22'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: npm install
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Install wrangler
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Deploy to Cloudflare
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              working-directory: ck-nemotron-worker
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: wrangler deploy
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        deploy-command-center:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            name: Deploy Command Center
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                needs: test
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - uses: actions/setup-node@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          node-version: '22'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Install wrangler
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Create Pages project if needed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: wrangler pages project create ck-command-center --production-branch=main 2>&1 || echo "Project may already exist - continuing"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Deploy to Cloudflare Pages
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true
