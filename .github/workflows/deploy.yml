name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all workspace dependencies
        run: npm ci

      - name: Test API Gateway
        run: npm run test:gateway

      - name: Test Sentinel Webhook
        run: npm run test:sentinel

      - name: Test Nemotron Worker
        run: npm run test:nemotron

  deploy-gateway:
    name: Deploy API Gateway
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all workspace dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: npx wrangler deploy

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all workspace dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: npx wrangler deploy

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all workspace dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: npx wrangler deploy

  deploy-website:
    name: Deploy Website
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Pages project exists
        run: npx wrangler pages project create coastalkey-pm --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main

  deploy-command-center:
    name: Deploy Command Center
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Pages project exists
        run: npx wrangler pages project create ck-command-center --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main
