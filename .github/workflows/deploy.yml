name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all dependencies
        run: npm install

      - name: Test API Gateway
        run: npm run test:gateway

      - name: Test Sentinel Webhook
        run: npm run test:sentinel

      - name: Test Nemotron Worker
        run: npm run test:nemotron

  deploy-website:
    name: Deploy Website
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Verify credentials
        run: |
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "API Token length: ${#CLOUDFLARE_API_TOKEN}"
          wrangler whoami

      - name: List directory contents
        run: ls -la ck-website/

      - name: Create Pages project if needed
        run: wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-gateway:
    name: Deploy API Gateway
    needs: [test, deploy-website]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [test, deploy-gateway]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [test, deploy-sentinel]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-command-center:
    name: Deploy Command Center
    needs: [test, deploy-nemotron]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Create Pages project if needed
        run: wrangler pages project create ck-command-center --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
