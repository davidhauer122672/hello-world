name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Test API Gateway
        run: npm run test:gateway

      - name: Test Sentinel Webhook
        run: npm run test:sentinel

      - name: Test Nemotron Worker
        run: npm run test:nemotron

  deploy:
    name: Deploy All Services
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Verify Cloudflare credentials
        run: npx wrangler whoami

      # ── Website (Cloudflare Pages) ──
      - name: Deploy Website to Cloudflare Pages
        run: |
          npx wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || true
          npx wrangler pages deploy ck-website \
            --project-name=coastalkey-pm \
            --branch=main \
            --commit-dirty=true

      # ── API Gateway (Cloudflare Worker) ──
      - name: Deploy API Gateway
        working-directory: ck-api-gateway
        run: npx wrangler deploy

      # ── Sentinel Webhook (Cloudflare Worker) ──
      - name: Deploy Sentinel Webhook
        working-directory: sentinel-webhook
        run: npx wrangler deploy

      # ── Nemotron Worker (Cloudflare Worker) ──
      - name: Deploy Nemotron Worker
        working-directory: ck-nemotron-worker
        run: npx wrangler deploy

      # ── Command Center (Cloudflare Pages) ──
      - name: Deploy Command Center
        run: |
          npx wrangler pages project create ck-command-center --production-branch=main 2>&1 || true
          npx wrangler pages deploy ck-command-center \
            --project-name=ck-command-center \
            --branch=main \
            --commit-dirty=true

      - name: Deploy complete
        run: |
          echo "All services deployed successfully"
          echo "  Website:        coastalkey-pm.com"
          echo "  API Gateway:    ck-api-gateway.david-e59.workers.dev"
          echo "  Sentinel:       sentinel-webhook.david-e59.workers.dev"
          echo "  Nemotron:       ck-nemotron-worker.david-e59.workers.dev"
          echo "  Command Center: ck-command-center.pages.dev"
