name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: '3'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all dependencies
        run: npm install

      - name: Initialize data files
        run: node scripts/init-data.js

      - name: Test Express Server
        run: npm run test:server

      - name: Test API Gateway
        run: npm run test:gateway

      - name: Test Sentinel Webhook
        run: npm run test:sentinel

      - name: Test Nemotron Worker
        run: npm run test:nemotron

  preflight:
    name: Preflight Token Check
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Validate Cloudflare token
        run: |
          echo "Runner IP: $(curl -s https://ifconfig.me)"
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "API Token length: ${#CLOUDFLARE_API_TOKEN}"
          if ! wrangler whoami 2>&1; then
            echo ""
            echo "::error::Cloudflare API token validation failed."
            echo "::error::This is likely due to IP restrictions on the API token (error 9109)."
            echo "::error::Fix: Cloudflare Dashboard > My Profile > API Tokens > Edit token > Remove IP restriction or add GitHub Actions runner IPs."
            exit 1
          fi

  deploy-website:
    name: Deploy Website
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Create Pages project if needed
        run: wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-gateway:
    name: Deploy API Gateway
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  deploy-command-center:
    name: Deploy Command Center
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Create Pages project if needed
        run: wrangler pages project create ck-command-center --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
