name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Initialize data files
        run: node scripts/init-data.js
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Test Express Server
        run: npm run test:server
      - name: Test API Gateway
        working-directory: ck-api-gateway
        run: npm test
      - name: Test Sentinel Webhook
        working-directory: sentinel-webhook
        run: npm test
      - name: Test Nemotron Worker
        working-directory: ck-nemotron-worker
        run: npm test

  deploy-gateway:
    name: Deploy API Gateway
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root dependencies
        run: npm install --ignore-scripts
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: npx wrangler deploy

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root dependencies
        run: npm install --ignore-scripts
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: npx wrangler deploy

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root dependencies
        run: npm install --ignore-scripts
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: npx wrangler deploy

  deploy-command-center:
    name: Deploy Command Center
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ck-command-center --project-name=ck-command-center
