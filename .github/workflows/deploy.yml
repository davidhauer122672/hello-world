name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: '4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Initialize data files
        run: node scripts/init-data.js
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Test Express Server
        run: npm run test:server
      - name: Test API Gateway
        working-directory: ck-api-gateway
        run: npm test
      - name: Test Sentinel Webhook
        working-directory: sentinel-webhook
        run: npm test
      - name: Test Nemotron Worker
        working-directory: ck-nemotron-worker
        run: npm test

  preflight:
    name: Preflight Token Check
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Validate Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            exit 1
          fi
          for attempt in 1 2 3; do
            if wrangler whoami 2>&1; then
              echo "Token validated."
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::error::Token validation failed. Check IP restrictions or regenerate."
          exit 1

  deploy-website:
    name: Deploy Website
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Create Pages project if needed
        run: wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || true
      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-gateway:
    name: Deploy API Gateway
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-command-center:
    name: Deploy Command Center
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Create Pages project if needed
        run: wrangler pages project create ck-command-center --production-branch=main 2>&1 || true
      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done
