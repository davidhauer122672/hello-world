name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: '4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Initialize data files
        run: node scripts/init-data.js
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Test Express Server
        run: npm run test:server
      - name: Test API Gateway
        working-directory: ck-api-gateway
        run: npm test
      - name: Test Sentinel Webhook
        working-directory: sentinel-webhook
        run: npm test
      - name: Test Nemotron Worker
        working-directory: ck-nemotron-worker
        run: npm test

  deploy-website:
    name: Deploy Website
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || true
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-command-center:
    name: Deploy Command Center
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages project create ck-command-center --production-branch=main 2>&1 || true
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-gateway:
    name: Deploy API Gateway
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install gateway dependencies
        working-directory: ck-api-gateway
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [test, deploy-gateway]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install sentinel dependencies
        working-directory: sentinel-webhook
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [test, deploy-gateway]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Install nemotron dependencies
        working-directory: ck-nemotron-worker
        run: npm install
      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break
            echo "Attempt $i failed, retrying in 15s..." && sleep 15
          done

  smoke-test:
    name: Live Smoke Test and Status Record
    needs: [deploy-gateway, deploy-sentinel, deploy-nemotron, deploy-website, deploy-command-center]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Probe live workers
        id: probe
        env:
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN }}
        run: |
          set +e
          GATEWAY_URL="https://ck-api-gateway.david-e59.workers.dev"
          NEMOTRON_URL="https://ck-nemotron-worker.david-e59.workers.dev"
          SENTINEL_URL="https://sentinel-webhook.david-e59.workers.dev"

          # Allow Cloudflare a moment to propagate after wrangler deploy
          sleep 20

          # Public health probes (no auth)
          GATEWAY_HEALTH=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$GATEWAY_URL/v1/health" || echo "fail")
          NEMOTRON_HEALTH=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$NEMOTRON_URL/v1/health" || echo "fail")
          SENTINEL_HEALTH=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$SENTINEL_URL/" || echo "fail")

          # Authenticated orchestrator probe (requires WORKER_AUTH_TOKEN secret in repo)
          COLL_ID="auth_token_missing"
          COLL_STATUS="auth_token_missing"
          MASTER_STATUS="auth_token_missing"
          DASHBOARD_HTTP="skipped"

          if [ -n "$WORKER_AUTH_TOKEN" ]; then
            DASHBOARD_HTTP=$(curl -sS --max-time 15 -o /tmp/dashboard.json -w "%{http_code}" \
              -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
              "$GATEWAY_URL/v1/orchestrator/dashboard" || echo "fail")

            if [ "$DASHBOARD_HTTP" = "200" ]; then
              COLL_ID=$(node -e "const j=require('/tmp/dashboard.json'); console.log(j.collectionsAgent && j.collectionsAgent.id || 'missing')" 2>/dev/null || echo "parse_error")
              COLL_STATUS=$(node -e "const j=require('/tmp/dashboard.json'); console.log(j.collectionsAgent && j.collectionsAgent.status || 'missing')" 2>/dev/null || echo "parse_error")
              MASTER_STATUS=$(node -e "const j=require('/tmp/dashboard.json'); console.log(j.status || 'missing')" 2>/dev/null || echo "parse_error")
            fi
          fi

          echo "gateway_health=$GATEWAY_HEALTH" >> "$GITHUB_OUTPUT"
          echo "nemotron_health=$NEMOTRON_HEALTH" >> "$GITHUB_OUTPUT"
          echo "sentinel_health=$SENTINEL_HEALTH" >> "$GITHUB_OUTPUT"
          echo "dashboard_http=$DASHBOARD_HTTP" >> "$GITHUB_OUTPUT"
          echo "coll_id=$COLL_ID" >> "$GITHUB_OUTPUT"
          echo "coll_status=$COLL_STATUS" >> "$GITHUB_OUTPUT"
          echo "master_status=$MASTER_STATUS" >> "$GITHUB_OUTPUT"

      - name: Write deploy-status.json
        run: |
          cat > deploy-status.json <<EOF
          {
            "lastVerifiedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "gateway": {
              "url": "https://ck-api-gateway.david-e59.workers.dev",
              "healthHttpStatus": "${{ steps.probe.outputs.gateway_health }}",
              "dashboardHttpStatus": "${{ steps.probe.outputs.dashboard_http }}",
              "masterPromptStatus": "${{ steps.probe.outputs.master_status }}",
              "collectionsAgent": {
                "id": "${{ steps.probe.outputs.coll_id }}",
                "status": "${{ steps.probe.outputs.coll_status }}"
              }
            },
            "nemotron": {
              "url": "https://ck-nemotron-worker.david-e59.workers.dev",
              "healthHttpStatus": "${{ steps.probe.outputs.nemotron_health }}"
            },
            "sentinel": {
              "url": "https://sentinel-webhook.david-e59.workers.dev",
              "healthHttpStatus": "${{ steps.probe.outputs.sentinel_health }}"
            }
          }
          EOF
          cat deploy-status.json

      - name: Commit deploy-status.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status.json
          if git diff --cached --quiet; then
            echo "No status change."
          else
            git commit -m "Record live deploy verification for ${{ github.sha }} [skip ci]"
            git push
          fi
