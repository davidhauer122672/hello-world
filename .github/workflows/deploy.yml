name: Deploy Coastal Key Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: '3'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Initialize data files
        run: node scripts/init-data.js

      - name: Test Express Server
        run: npm run test:server

      - name: Test API Gateway
        run: npm run test:gateway

      - name: Test Media Automation Pipeline
        run: node --test ck-api-gateway/src/__tests__/media-automation.test.js

      - name: Test Sentinel Webhook
        run: npm run test:sentinel

      - name: Test Nemotron Worker
        run: npm run test:nemotron

  preflight:
    name: Preflight Token Check
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Validate Cloudflare token
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me || echo "unknown")
          echo "Runner IP: $RUNNER_IP"
          echo "Account ID set: $([ -n "$CLOUDFLARE_ACCOUNT_ID" ] && echo 'yes' || echo 'NO')"
          echo "API Token set: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo 'yes' || echo 'NO')"

          # Verify token via Cloudflare API (detects error 9109 before wrangler deploy)
          TOKEN_CHECK=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" 2>&1) || true

          if echo "$TOKEN_CHECK" | grep -q '"status":"active"'; then
            echo "Cloudflare API token verified: active"
          else
            echo "::warning::Cloudflare API token verification response: $TOKEN_CHECK"
            # Check for IP restriction (error 9109)
            if echo "$TOKEN_CHECK" | grep -q '9109\|not allowed'; then
              echo ""
              echo "::error::Cloudflare API token blocked by IP restriction (error 9109)."
              echo "::error::Runner IP: $RUNNER_IP"
              echo "::error::Fix: Cloudflare Dashboard > My Profile > API Tokens > Edit token"
              echo "::error::Option A: Remove 'IP Address Filtering' entirely (recommended for CI/CD)"
              echo "::error::Option B: Add GitHub Actions IP ranges (not recommended — they rotate)"
              echo "::error::Docs: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
              exit 1
            fi
          fi

          # Final wrangler verification
          if ! wrangler whoami 2>&1; then
            echo "::error::wrangler whoami failed. Token may be expired or revoked."
            exit 1
          fi

  deploy-website:
    name: Deploy Website
    needs: preflight
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Create Pages project if needed
        run: wrangler pages project create coastalkey-pm --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-website --project-name=coastalkey-pm --branch=main --commit-dirty=true && exit 0
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          echo "::error::All deploy retries exhausted for website"
          exit 1

  deploy-gateway:
    name: Deploy API Gateway
    needs: preflight
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-api-gateway
        run: |
          for i in 1 2 3; do
            wrangler deploy && exit 0
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          echo "::error::All deploy retries exhausted"
          exit 1

  deploy-sentinel:
    name: Deploy Sentinel Webhook
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: sentinel-webhook
        run: |
          for i in 1 2 3; do
            wrangler deploy && exit 0
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          echo "::error::All deploy retries exhausted"
          exit 1

  deploy-nemotron:
    name: Deploy Nemotron Worker
    needs: [preflight, deploy-gateway]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare
        working-directory: ck-nemotron-worker
        run: |
          for i in 1 2 3; do
            wrangler deploy && exit 0
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          echo "::error::All deploy retries exhausted"
          exit 1

  deploy-command-center:
    name: Deploy Command Center
    needs: preflight
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

      - name: Create Pages project if needed
        run: wrangler pages project create ck-command-center --production-branch=main 2>&1 || echo "Project may already exist — continuing"

      - name: Deploy to Cloudflare Pages
        run: |
          for i in 1 2 3; do
            wrangler pages deploy ck-command-center --project-name=ck-command-center --branch=main --commit-dirty=true && exit 0
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          echo "::error::All deploy retries exhausted for command-center"
          exit 1
