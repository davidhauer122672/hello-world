name = "ck-api-gateway"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
AIRTABLE_BASE_ID = "appUSnNgpDkcEOzhN"
ENVIRONMENT = "production"
RATE_LIMIT_RPM = "60"
MAX_TRANSCRIPT_CHARS = "100000"

# ── KV Namespace Bindings ──
# These cache inference results, session state, rate limits, and audit logs

[[kv_namespaces]]
binding = "CACHE"
id = "2a4a09a04ea146b29fa06ebb9af61609"

[[kv_namespaces]]
binding = "SESSIONS"
id = "c88aa8d5534c4b0cb3f2722f97cceca6"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "0acfb96a7aaf49bb92055c143a882506"

[[kv_namespaces]]
binding = "AUDIT_LOG"
id = "3d722426db4241209fd0444b42f84904"

# ── Cron Triggers (Workflow Engine — replaces Zapier scheduled triggers) ──
# Runs the workflow engine's poll cycle and scheduled workflows.
[triggers]
crons = [
  "*/5 * * * *",       # Every 5 min: Poll Airtable for new records (WF triggers)
  "0 13 * * 1-6",      # 8 AM EST Mon-Sat: Daily campaign digest (WF-6)
  "0 14 * * 1",        # 9 AM EST Monday: Stale lead check (WF-7)
  "0 15 * * 1-5",      # 10 AM EST Weekdays: Property intel update (WF-9)
  "*/30 * * * *",      # Every 30 min: System health monitor (WF-10)
]

# ── Secrets (set via dashboard or `wrangler secret put`) ──
# ANTHROPIC_API_KEY        — Anthropic console API key
# AIRTABLE_API_KEY         — Airtable personal access token
# WORKER_AUTH_TOKEN         — Auth token for external callers (Retell, automations)
# SLACK_WEBHOOK_URL         — Slack incoming webhook for notifications
