<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- David Yurman-inspired metallic gradient — platinum finish -->
    <linearGradient id="platinum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#D4D4D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8A8A8;stop-opacity:1" />
    </linearGradient>
    <!-- Deep ocean gradient — Coastal Key signature -->
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B365D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2847;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent — precision detail -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <!-- Inner glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background — Deep navy, institutional authority -->
  <rect width="400" height="400" rx="20" ry="20" fill="url(#ocean)"/>

  <!-- Outer ring — David Yurman cable-inspired border -->
  <circle cx="200" cy="185" r="135" fill="none" stroke="url(#platinum)" stroke-width="3" opacity="0.6"/>
  <circle cx="200" cy="185" r="130" fill="none" stroke="url(#platinum)" stroke-width="1" opacity="0.3"/>

  <!-- Central shield — the mark of sovereign governance -->
  <path d="M200 65 L280 120 L280 230 L200 285 L120 230 L120 120 Z"
        fill="none" stroke="url(#platinum)" stroke-width="2.5" filter="url(#shadow)" opacity="0.9"/>

  <!-- Inner shield fill — subtle depth -->
  <path d="M200 72 L274 124 L274 226 L200 278 L126 226 L126 124 Z"
        fill="url(#ocean)" opacity="0.5"/>

  <!-- Key icon — the Coastal "Key" — precision-engineered -->
  <!-- Key head (circle with notch) -->
  <circle cx="200" cy="145" r="28" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="200" cy="145" r="16" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Key shaft -->
  <line x1="200" y1="173" x2="200" y2="245" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Key teeth — 3 precision cuts -->
  <line x1="200" y1="215" x2="215" y2="215" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="228" x2="212" y2="228" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="241" x2="218" y2="241" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wave accent — the Coastal element -->
  <path d="M140 255 Q160 245 180 255 Q200 265 220 255 Q240 245 260 255"
        fill="none" stroke="url(#platinum)" stroke-width="1.5" opacity="0.5"/>

  <!-- COASTAL KEY — Primary wordmark -->
  <text x="200" y="340" text-anchor="middle"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="28" font-weight="bold" letter-spacing="8"
        fill="url(#platinum)" filter="url(#shadow)">COASTAL KEY</text>

  <!-- Tagline — property management authority -->
  <text x="200" y="365" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="9" letter-spacing="4" font-weight="300"
        fill="#8899AA">PROPERTY MANAGEMENT</text>

  <!-- Sovereign governance mark — bottom corner -->
  <text x="200" y="385" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="6" letter-spacing="3"
        fill="#556677">EST. TREASURE COAST, FLORIDA</text>
</svg>
