<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    Coastal Key Property Management — Bauhaus Logo
    Principles: Form follows function. Geometric purity. Primary palette.
    Zero ornamentation. No shadows, gradients, glows, or decorative elements.
    References: Walter Gropius, Herbert Bayer, Wassily Kandinsky.
  -->

  <!-- Background — Pure navy, flat, honest -->
  <rect width="400" height="400" fill="#1B365D"/>

  <!-- Geometric frame — rectangle, the fundamental Bauhaus form -->
  <rect x="60" y="50" width="280" height="280" fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Key icon — geometric primitives only -->
  <!-- Key head: circle (Kandinsky: calm, depth) -->
  <circle cx="200" cy="140" r="32" fill="none" stroke="#DAA520" stroke-width="3"/>
  <!-- Key head inner: smaller circle -->
  <circle cx="200" cy="140" r="14" fill="none" stroke="#DAA520" stroke-width="2"/>

  <!-- Key shaft: rectangle (fundamental form) -->
  <rect x="197" y="172" width="6" height="90" fill="#DAA520"/>

  <!-- Key teeth: three rectangles, asymmetric, functional -->
  <rect x="203" y="218" width="18" height="4" fill="#DAA520"/>
  <rect x="203" y="234" width="12" height="4" fill="#DAA520"/>
  <rect x="203" y="250" width="22" height="4" fill="#DAA520"/>

  <!-- Red accent triangle — Kandinsky: warm, energetic, directional -->
  <polygon points="60,330 76,330 68,316" fill="#C41E3A"/>

  <!-- COASTAL KEY — Herbert Bayer universal style: geometric sans, tracked -->
  <text x="200" y="345" text-anchor="middle"
        font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="26" font-weight="700" letter-spacing="10"
        fill="#FFFFFF">COASTAL KEY</text>

  <!-- Tagline — lowercase favored per Bayer, functional type -->
  <text x="200" y="368" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="9" font-weight="400" letter-spacing="5"
        fill="#9E9E9E">property management</text>

  <!-- Location — minimal, functional -->
  <text x="200" y="388" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="6" font-weight="400" letter-spacing="3"
        fill="#9E9E9E">treasure coast, florida</text>
</svg>
